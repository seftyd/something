#sidebar{
width:350px;
background:#222;
border-right:2px solid #00d1ff;
padding:15px;
display:flex;
flex-direction:column;
box-shadow:5px 0 15px rgba(0,0,0,.5);
opacity:0;
transform:translateX(-10px);

}




#viewer{
flex-grow:1;
background:#000;

opacity:0;
transform:translateX(10px);

}




h2{
color:#00d1ff;
font-size:1em;

select,input{

}




#game-list{

padding-right:5px;

.game-btn{

padding:10px;
margin:4px 0;
border-radius:4px;
cursor:pointer;
transition:.2s;
font-size:.9em;
border-left:3px solid transparent;
}




.game-btn:hover{
background:#3a3a3a;
border-left-color:#00d1ff;
transform:translateX(2px);
}




.active-game{
background:#00d1ff!important;
color:#000;
font-weight:bold;
}




#status-bar{
background:#111;
padding:10px 20px;
font-size:.8em;
border-bottom:1px solid #333;
color:#888;
display:flex;
justify-content:space-between;
align-items:center;
}




iframe{
flex-grow:1;
border:none;
width:100%;
height:100%;
background:#000;
opacity:0;
transition:opacity .4s ease;
}




.hl{
color:#00d1ff;
font-weight:bold;
}




#loader-overlay{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.6);
z-index:5;
opacity:0;
pointer-events:none;
transition:opacity .3s ease;
}




#loader-overlay.active{
opacity:1;
pointer-events:auto;
}




.loader-spinner{
width:48px;
height:48px;
border:4px solid rgba(0,209,255,.2);
border-top-color:#00d1ff;
border-radius:50%;
animation:spin .8s linear infinite;
}




@keyframes spin{
to{transform:rotate(360deg)}
}




#viewer-wrapper{
position:relative;
flex-grow:1;
display:flex;
flex-direction:column;
}




#home-screen{

inset:0;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
z-index:10;
transition:opacity .4s ease;
}




#home-screen.hidden{
opacity:0;

}

color:#000;
padding:15px 25px;
margin:10px;
border-radius:6px;
font-size:1.1em;
cursor:pointer;

    <script>
      var loadingText = document.querySelector("#loading-text");
      let totalBytes = 0;
      let loadedBytes = 0;




      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        let chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);
          let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
          let mbTotal = '155.84';
          if (loadingText) {
            loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
          }
        }
        let fullBuffer = new Uint8Array(received);
        let offset = 0;
        for (let chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }
        return fullBuffer.buffer;
      }




      async function mergeFiles(fileParts, cacheKey) {
        const buffers = await Promise.all(
          fileParts.map(part => fetchWithProgress(part))
        );
        const mergedBlob = new Blob(buffers);
        return URL.createObjectURL(mergedBlob);
      }




      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }




      (async () => {
        const [dataUrl, wasmUrl, webm] = await Promise.all([
          mergeFiles(getParts("Build/fnae.data", 1, 3), "fnae.data"),
          mergeFiles(getParts("Build/fnae.wasm", 1, 3), "fnae.wasm"),
          mergeFiles(getParts("StreamingAssets/202512191935.webm", 1, 3), "202512191935.webm"),
        ]);




        window.randomwebm = webm;
        const realSrc = Object.getOwnPropertyDescriptor(
          HTMLMediaElement.prototype,
          "src"
        );




        Object.defineProperty(HTMLMediaElement.prototype, "src", {
          set(value) {
            if (typeof value === "string" && (value.includes("202512191935.mp4") || value.includes("202512191935.webm"))) {
              value = window.randomwebm;
            }
            return realSrc.set.call(this, value);
          },
          get() {
            return realSrc.get.call(this);
          }
        });




        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");




        function unityShowBanner(msg, type) {}




        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/fnae.loader.js";
        var config = {
          arguments: [],
          dataUrl: dataUrl,
          frameworkUrl: buildUrl + "/fnae.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "DefaultCompany",
          productName: "fnae",
          productVersion: "1.0",
          showBanner: unityShowBanner,
        };




        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
        }




        loadingBar.style.display = "block";




        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            if (loadingText) loadingText.remove();
          }).catch((message) => {
            console.error(message);
          });
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>

function showLoader(){
  document.getElementById("loader-overlay").classList.add("active");
  document.getElementById("game-frame").style.opacity = "0";
}




function hideLoader(){
  document.getElementById("loader-overlay").classList.remove("active");
  document.getElementById("game-frame").style.opacity = "1";
}




function switchProxy(){
  const encoded = document.getElementById("proxy-selector").value;
  currentBase = atob(encoded).trim();
  document.getElementById("current-url").innerText = currentBase;




  if(selectedGameUrl){
    showLoader();
    loadFrame();
  }
}




function renderGames(){
  const term = document.getElementById("search").value.toLowerCase();
  const container = document.getElementById("game-list");




  container.innerHTML = "";




  const filtered = games.filter(g => g.name.toLowerCase().includes(term));
  document.getElementById("count").innerText = filtered.length;




  filtered.forEach(game => {
    const div = document.createElement("div");
    div.className = "game-btn";
    div.innerText = game.name;




    div.onclick = () => {
      document.querySelectorAll(".game-btn").forEach(b => b.classList.remove("active-game"));
      div.classList.add("active-game");




      document.getElementById("active-title").innerText = game.name;
      selectedGameUrl = game.url;




      showLoader();
      loadFrame();
    };




    container.appendChild(div);
  });
}




function loadFrame() {
  const frame = document.getElementById("game-frame");


  if (selectedGameUrl === "__notebook__") {
    frame.removeAttribute("srcdoc");
    frame.src = "https://notebooks.kozow.com/";
  }


  else if (selectedGameUrl === "__fnae__") {
    const launcherHTML = document.getElementById("fnae-launcher").innerHTML;
    frame.src = "about:blank";
    frame.srcdoc = launcherHTML;
  }
  
  
  else if (selectedGameUrl === "__ace__") {
    frame.removeAttribute("srcdoc");
    frame.src = "http://localhost:8080/";
  }
  

  else if (selectedGameUrl === "__arctic__") {
    frame.removeAttribute("srcdoc");
    frame.src = "https://science.wikidelia.net/arcticmathsearch.html";
  }


  else {
    frame.removeAttribute("srcdoc");
    frame.src = currentBase + selectedGameUrl;
  }


  document.getElementById("home-screen").classList.add("hidden");
}




function openLibrary() {
  document.getElementById("home-screen").classList.add("hidden");
  renderGames();
}




function randomGame() {
  const game = games[Math.floor(Math.random() * games.length)];
  selectedGameUrl = game.url;
  document.getElementById("active-title").innerText = game.name;
  showLoader();
  loadFrame();
}




function goHome() {
  document.getElementById("home-screen").classList.remove("hidden");
  document.getElementById("active-title").innerText = "None";
  const frame = document.getElementById("game-frame");
  frame.src = "about:blank";
  frame.removeAttribute("srcdoc");
}
